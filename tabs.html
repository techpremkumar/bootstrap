<!DOCTYPE html>
<html>

<head>

    <!-- =====================================================
         Page Title
         Displays the title in the browser tab.
    ====================================================== -->
    <title>Bootstrap Tabs Example</title>

    <!-- =====================================================
         Bootstrap 5 CSS CDN
         Used for Bootstrap styling and components.
    ====================================================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- =====================================================
         Bootstrap Container
         container : Creates a responsive container.
         mt-5      : Adds top margin (3rem).
    ====================================================== -->
    <div class="container mt-5">

        <h2 class="mb-4">Bootstrap Tabs Example</h2>

        <!-- =====================================================
             Navigation Tabs
        ====================================================== -->

        <!--
            nav         : Creates a navigation menu.
            nav-tabs    : Converts navigation into Bootstrap Tabs.
        -->
        <ul class="nav nav-tabs">

            <!-- First Tab -->
            <li class="nav-item">

                <!--
                    nav-link
                    --------
                    Creates a clickable tab.

                    active
                    ------
                    Makes this tab active by default.

                    data-bs-toggle="tab"
                    --------------------
                    Enables Bootstrap Tabs.

                    href="#home"
                    ------------
                    Connects the tab with the content section.
                -->
                <a class="nav-link active"
                   data-bs-toggle="tab"
                   href="#home">

                    Home

                </a>

            </li>

            <!-- Second Tab -->
            <li class="nav-item">

                <a class="nav-link"
                   data-bs-toggle="tab"
                   href="#about">

                    About

                </a>

            </li>

            <!-- Third Tab -->
            <li class="nav-item">

                <a class="nav-link"
                   data-bs-toggle="tab"
                   href="#contact">

                    Contact

                </a>

            </li>

        </ul>

        <!-- =====================================================
             Tab Content Starts
        ====================================================== -->

        <!--
            tab-content
            -----------
            Holds all tab panes.
        -->
        <div class="tab-content mt-3">

            <!-- ==========================================
                 Home Tab
            =========================================== -->

            <!--
                tab-pane
                --------
                Creates one content section.

                fade
                ----
                Adds fade animation.

                show active
                -----------
                Displays this tab by default.
            -->
            <div class="tab-pane fade show active"
                 id="home">

                <h4>Home</h4>

                <p>Welcome to the Home Page.</p>

            </div>

            <!-- ==========================================
                 About Tab
            =========================================== -->

            <div class="tab-pane fade"
                 id="about">

                <h4>About</h4>

                <p>This is the About Page.</p>

            </div>

            <!-- ==========================================
                 Contact Tab
            =========================================== -->

            <div class="tab-pane fade"
                 id="contact">

                <h4>Contact</h4>

                <p>This is the Contact Page.</p>

            </div>

        </div>

    </div>

    <!-- =====================================================
         Bootstrap JavaScript Bundle
         Required for Tabs functionality.
    ====================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
