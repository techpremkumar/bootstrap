<!DOCTYPE html>
<html>

<head>

    <!-- =====================================================
         Page Title
         Displays the title in the browser tab.
    ====================================================== -->
    <title>Bootstrap Modal Example</title>

    <!-- =====================================================
         Bootstrap 5 CSS CDN
         Used for Bootstrap styling and components.
    ====================================================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- =====================================================
         Bootstrap Container
         container : Creates a responsive fixed-width container.
         mt-5      : Adds top margin (3rem).
    ====================================================== -->
    <div class="container mt-5">

        <h2 class="mb-4">Bootstrap Modal Example</h2>

        <!-- =====================================================
             Modal Button
         ====================================================== -->

        <!--
            btn                 : Creates a Bootstrap button.
            btn-primary         : Blue colored button.
            data-bs-toggle      : Enables Bootstrap Modal.
            data-bs-target      : Specifies which modal should open.
        -->
        <button class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#myModal">

            Open Modal

        </button>

    </div>

    <!-- =====================================================
         Modal Starts
    ====================================================== -->

    <!--
        modal      : Creates a Bootstrap modal.
        fade       : Adds fade animation.
        id         : Unique identifier for the modal.
        tabindex   : Improves keyboard accessibility.
    -->
    <div class="modal fade"
         id="myModal"
         tabindex="-1">

        <!--
            modal-dialog
            ------------
            Creates the dialog box.
        -->
        <div class="modal-dialog">

            <!--
                modal-content
                -------------
                Holds Header, Body and Footer.
            -->
            <div class="modal-content">

                <!-- ==========================================
                     Modal Header
                =========================================== -->

                <!--
                    modal-header
                    ------------
                    Displays the title and close button.
                -->
                <div class="modal-header">

                    <!-- Modal Title -->
                    <h5 class="modal-title">
                        Welcome
                    </h5>

                    <!--
                        btn-close
                        ---------
                        Creates Bootstrap close (X) button.

                        data-bs-dismiss="modal"
                        -----------------------
                        Closes the modal.
                    -->
                    <button class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <!-- ==========================================
                     Modal Body
                =========================================== -->

                <!--
                    modal-body
                    ----------
                    Displays the main content.
                -->
                <div class="modal-body">

                    Hello! This is a Bootstrap Modal.

                </div>

                <!-- ==========================================
                     Modal Footer
                =========================================== -->

                <!--
                    modal-footer
                    -------------
                    Displays buttons at the bottom.
                -->
                <div class="modal-footer">

                    <!-- Close Button -->
                    <button class="btn btn-secondary"
                            data-bs-dismiss="modal">

                        Close

                    </button>

                    <!-- Save Button -->
                    <button class="btn btn-primary">

                        Save Changes

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- =====================================================
         Modal Ends
    ====================================================== -->

    <!-- =====================================================
         Bootstrap JavaScript Bundle
         Required for Modal functionality.
    ====================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
