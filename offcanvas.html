<!DOCTYPE html>
<html>

<head>

    <!-- =====================================================
         Page Title
         Displays the title in the browser tab.
    ====================================================== -->
    <title>Bootstrap Offcanvas Example</title>

    <!-- =====================================================
         Bootstrap 5 CSS CDN
         Used for Bootstrap styling.
    ====================================================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- =====================================================
         Bootstrap Container
         container : Creates a responsive container.
         mt-5      : Adds top margin (3rem).
    ====================================================== -->
    <div class="container mt-5">

        <h2 class="mb-4">Bootstrap Offcanvas Example</h2>

        <!--
            btn                 : Bootstrap button.
            btn-primary         : Blue colored button.
            data-bs-toggle      : Enables Offcanvas.
            data-bs-target      : Opens the specified Offcanvas.
        -->
        <button class="btn btn-primary"
                data-bs-toggle="offcanvas"
                data-bs-target="#myOffcanvas">

            Open Menu

        </button>

    </div>

    <!-- =====================================================
         Offcanvas Starts
    ====================================================== -->

    <!--
        offcanvas          : Creates Offcanvas.
        offcanvas-start    : Opens from Left.

        Other Positions:
        offcanvas-end
        offcanvas-top
        offcanvas-bottom
    -->
    <div class="offcanvas offcanvas-start"
         id="myOffcanvas">

        <!-- Offcanvas Header -->
        <div class="offcanvas-header">

            <!-- Title -->
            <h5 class="offcanvas-title">
                Sidebar Menu
            </h5>

            <!-- Close Button -->
            <button class="btn-close"
                    data-bs-dismiss="offcanvas">
            </button>

        </div>

        <!-- Offcanvas Body -->
        <div class="offcanvas-body">

            <p>This is Bootstrap Offcanvas.</p>

            <button class="btn btn-success">
                Click Here
            </button>

        </div>

    </div>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
