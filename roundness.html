<!DOCTYPE html>
<html>

<head>

    <!-- Title displayed in the browser tab -->
    <title>Bootstrap Rounded Example</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- rounded-0 : Removes all rounded corners -->
    <div class="border rounded-0">
        Rounded 0
    </div>

    <br>

    <!-- rounded-1 : Adds small rounded corners -->
    <div class="border rounded-1">
        Rounded 1
    </div>

    <br>

    <!-- rounded-2 : Adds medium rounded corners -->
    <div class="border rounded-2">
        Rounded 2
    </div>

    <br>

    <!-- rounded-3 : Adds large rounded corners -->
    <div class="border rounded-pill">
        Rounded 3
    </div>

    <br>

    <!-- rounded-4 : Adds extra large rounded corners -->
    <div class="border rounded-4">
        Rounded 4
    </div>

    <br>

    <!-- rounded-5 : Adds maximum rounded corners -->
    <div class="border rounded-5">
        Rounded 5
    </div>

    <br>

    <!-- rounded : Adds default rounded corners -->
    <div class="border rounded">
        Default Rounded
    </div>

    <br>

    <!-- rounded-pill : Creates a pill-shaped element -->
    <div class="border rounded-pill">
        Rounded Pill
    </div>

    <br>

    <!-- rounded-circle : Creates a circular element
         Note: Width and height must be equal -->
    <div class="border rounded-circle"
         style="width:120px; height:120px;">
    </div>

</body>

</html>
