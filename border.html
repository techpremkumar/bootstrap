<!DOCTYPE html>
<html>

<head>

    <!-- Title displayed in browser tab -->
    <title>Bootstrap Borders Example</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- Bootstrap Container -->
    <div class="container mt-5">

        <!-- border : Adds border on all four sides -->
        <div class="border p-3 mb-3">
            Border on all sides
        </div>

        <!-- border-top : Adds border only to the top -->
        <div class="border-top p-3 mb-3">
            Top Border
        </div>

        <!-- border-bottom : Adds border only to the bottom -->
        <div class="border-bottom p-3 mb-3">
            Bottom Border
        </div>

        <!-- border-start : Adds border only to the left -->
        <div class="border-start p-3 mb-3">
            Left Border (Start)
        </div>

        <!-- border-end : Adds border only to the right -->
        <div class="border-end p-3 mb-3">
            Right Border (End)
        </div>

        <!-- border border-primary
             Adds blue colored border -->
        <div class="border border-primary p-3 mb-3">
            Primary Border
        </div>

        <!-- border border-success
             Adds green colored border -->
        <div class="border border-success p-3 mb-3">
            Success Border
        </div>

        <!-- border border-danger
             Adds red colored border -->
        <div class="border border-danger p-3 mb-3">
            Danger Border
        </div>

        <!-- border border-3
             Adds medium thickness border -->
        <div class="border border-3 p-3 mb-3">
            Border Thickness 3
        </div>

        <!-- rounded
             Adds slightly rounded corners -->
        <div class="border rounded p-3 mb-3">
            Rounded Border
        </div>

        <!-- rounded-circle
             Creates a circular element -->
        <div class="border rounded-circle d-flex justify-content-center align-items-center"
             style="width:120px; height:120px;">
            Circle
        </div>

    </div>

</body>

</html>
