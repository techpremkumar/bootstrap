<!DOCTYPE html>
<html>

<head>

    <!-- Title displayed in the browser tab -->
    <title>Bootstrap Container Example</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- container : Fixed-width responsive container -->
    <div class="container border">
        Container
    </div>

    <br>

    <!-- container-fluid : Full-width container (100% width) -->
    <div class="container-fluid border">
        Container Fluid
    </div>
    <dIv class="row">
        span class="bg-warning m-2 p-2">Column 1</span>
    </dIv>

    <br>

    <!-- container-sm : 100% width until Small (sm) breakpoint -->
    <div class="container-sm border">
        Container Small
    </div>

    <br>

    <!-- container-md : 100% width until Medium (md) breakpoint -->
    <div class="container-md border">
        Container Medium
    </div>

    <br>

    <!-- container-lg : 100% width until Large (lg) breakpoint -->
    <div class="container-lg border">
        Container Large
    </div>

    <br>

    <!-- container-xl : 100% width until Extra Large (xl) breakpoint -->
    <div class="container-xl border">
        Container Extra Large
    </div>

    <br>

    <!-- container-xxl : 100% width until Extra Extra Large (xxl) breakpoint -->
    <div class="container-xxl border">
        Container Extra Extra Large
    </div>

</body>

</html>
