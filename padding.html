<!DOCTYPE html>
<html>

<head>

    <!-- Title displayed in the browser tab -->
    <title>Bootstrap Padding Example</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- Bootstrap Container
         Provides responsive spacing from the left and right sides -->
    <div class="container">

        <!-- p-3 : Adds padding on all four sides (1rem)
             bg-primary : Blue background
             text-white : White text -->
        <div class="p-3 bg-primary text-white">
            Padding on all sides
        </div>

        <br>

        <!-- pt-5 : Adds padding only to the top (3rem)
             bg-success : Green background
             text-white : White text -->
        <div class="pt-5 bg-success text-white">
            Padding Top
        </div>

        <br>

        <!-- pb-5 : Adds padding only to the bottom (3rem)
             bg-warning : Yellow background -->
        <div class="pb-5 bg-warning">
            Padding Bottom
        </div>

        <br>

        <!-- ps-5 : Adds padding to the start (Left in LTR)
             bg-info : Light blue background -->
        <div class="ps-5 bg-info">
            Padding Start (Left)
        </div>

        <br>

        <!-- pe-5 : Adds padding to the end (Right in LTR)
             bg-danger : Red background
             text-white : White text -->
        <div class="pe-5 bg-danger text-white">
            Padding End (Right)
        </div>

        <br>

        <!-- px-5 : Adds padding to Left and Right
             bg-secondary : Gray background
             text-white : White text -->
        <div class="px-5 bg-secondary text-white">
            Horizontal Padding (Left & Right)
        </div>

        <br>

        <!-- py-5 : Adds padding to Top and Bottom
             bg-dark : Black background
             text-white : White text -->
        <div class="py-5 bg-dark text-white">
            Vertical Padding (Top & Bottom)
        </div>

    </div>

</body>

</html>
