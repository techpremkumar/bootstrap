<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Bootstrap Buttons</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- ========================================= -->
    <!--               BOOTSTRAP BUTTONS            -->
    <!-- ========================================= -->

    <!-- Basic Syntax -->
    <!-- <button class="btn btn-primary">Button Name</button> -->

    <!-- btn = Base Bootstrap button class -->
    <!-- btn-primary = Blue button -->
    <button class="btn btn-primary">Primary</button>

    <br><br>

    <!-- btn-secondary = Gray button -->
    <button class="btn btn-secondary">Secondary</button>

    <br><br>

    <!-- btn-success = Green button -->
    <button class="btn btn-success">Success</button>

    <br><br>

    <!-- btn-danger = Red button -->
    <button class="btn btn-danger">Danger</button>

    <br><br>

    <!-- btn-warning = Yellow button -->
    <button class="btn btn-warning">Warning</button>

    <br><br>

    <!-- btn-info = Light Blue button -->
    <button class="btn btn-info">Info</button>

    <br><br>

    <!-- btn-light = White button -->
    <button class="btn btn-light">Light</button>

    <br><br>

    <!-- btn-dark = Black button -->
    <button class="btn btn-dark">Dark</button>

    <br><br>

    <!-- btn-link = Link style button -->
    <button class="btn btn-link">Link</button>
    <button class="btn btn-Secondary"></button
        <br>
        <!-- div class to create button group -->
        <div class="btn-group">
            <button class="btn btn-primary">Home</button>
            <button class="btn btn-secondary">Login</button>
        </div>

    <hr>

    <!-- ========================================= -->
    <!--               BUTTON TYPES                -->
    <!-- ========================================= -->

    <!-- type="button" = Used for JavaScript -->
    <button type="button" class="btn btn-primary">Normal Button</button>

    <br><br>

    <!-- type="submit" = Submits a form -->
    <button type="submit" class="btn btn-success">Submit Button</button>

    <br><br>

    <!-- type="reset" = Resets form fields -->
    <button type="reset" class="btn btn-danger">Reset Button</button>

    <hr>

    <!-- ========================================= -->
    <!--            INTERVIEW NOTES                -->
    <!-- ========================================= -->

    <!-- <button> supports text, icons, images, and HTML -->
    <!-- <input type="button"> supports only plain text -->

    <!-- <button> has opening and closing tags -->
    <!-- <input> is a self-closing tag -->

    <!-- Button Example -->
    <button class="btn btn-primary">
        Home
    </button>

    <br><br>

    <input type="button" value="Home">

    <!-- Bootstrap JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
