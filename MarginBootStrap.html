<!DOCTYPE html>
<html>

<head>

    <!-- Title displayed in the browser tab -->
    <title>Bootstrap Margin Example</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- Bootstrap Container
         Used to provide responsive left and right spacing -->
    <div class="container">

        <!-- m-3  : Adds margin on all four sides (1rem)
             p-3  : Adds padding on all four sides (1rem)
             bg-primary : Blue background
             text-white : White text color -->
        <div class="m-3 p-3 bg-primary text-white">
            Margin on all sides
        </div>

        <!-- mt-5 : Adds margin only to the top (3rem)
             p-3  : Padding on all sides
             bg-success : Green background
             text-white : White text -->
        <div class="mt-5 p-3 bg-success text-white">
            Margin Top
        </div>

        <!-- mb-5 : Adds margin only to the bottom (3rem)
             p-3  : Padding on all sides
             bg-warning : Yellow background -->
        <div class="mb-5 p-3 bg-warning">
            Margin Bottom
        </div>

        <!-- mx-auto : Automatically sets left and right margins,
                      which centers the element horizontally
             w-50    : Width is 50% of the parent container
             p-3     : Padding on all sides
             bg-danger : Red background
             text-white : White text
             text-center : Centers the text inside the element -->
        <div class="mx-auto w-50 p-3 bg-danger text-white text-center">
            Center using Auto Margin
        </div>

    </div>

</body>

</html>
