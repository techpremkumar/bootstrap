<!DOCTYPE html>
<html>

<head>

    <!-- Title displayed in browser tab -->
    <title>Bootstrap Multiple Cards</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

    <!-- ===================================================
         Bootstrap Container
         Used to keep content responsive
    ==================================================== -->

    <div class="container mt-5">

        <!-- ===================================================
             Row
             Used to arrange cards horizontally
        ==================================================== -->

        <div class="row">

            <!-- ===================================================
                 CARD 1
                 col-md-4 : Takes 4 columns out of 12
            ==================================================== -->

            <div class="col-md-4">

                <!-- Card Starts -->
                <div class="card" style="width:18rem;">

                    <!-- Card Image -->
                    <img src="images.png"
                         class="card-img-top"
                         alt="Apple">

                    <!-- Card Body -->
                    <div class="card-body">

                        <!-- Card Title -->
                        <h5 class="card-title">
                            Apple
                        </h5>

                        <!-- Card Description -->
                        <p class="card-text">
                            An Apple a day keeps the doctor away.
                        </p>

                        <!-- Bootstrap Button -->
                        <button class="btn btn-primary">
                            Buy Apple
                        </button>

                    </div>

                </div>

            </div>

            <!-- ===================================================
                 CARD 2
            ==================================================== -->

            <div class="col-md-4">

                <div class="card" style="width:18rem;">

                    <!-- Card Image -->
                    <img src="images.png"
                         class="card-img-top"
                         alt="Orange">

                    <!-- Card Body -->
                    <div class="card-body">

                        <!-- Card Title -->
                        <h5 class="card-title">
                            Orange
                        </h5>

                        <!-- Card Description -->
                        <p class="card-text">
                            Oranges are rich in Vitamin C.
                        </p>

                        <!-- Bootstrap Button -->
                        <button class="btn btn-success">
                            Buy Orange
                        </button>

                    </div>

                </div>

            </div>

            <!-- ===================================================
                 CARD 3
            ==================================================== -->

            <div class="col-md-4">

                <div class="card" style="width:18rem;">

                    <!-- Card Image -->
                    <img src="images.png"
                         class="card-img-top"
                         alt="Banana">

                    <!-- Card Body -->
                    <div class="card-body">

                        <!-- Card Title -->
                        <h5 class="card-title">
                            Banana
                        </h5>

                        <!-- Card Description -->
                        <p class="card-text">
                            Bananas are a great source of potassium.
                        </p>

                        <!-- Bootstrap Button -->
                        <button class="btn btn-warning">
                            Buy Banana
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
