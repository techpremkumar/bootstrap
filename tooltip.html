<!DOCTYPE html>
<html>

<head>

    <!-- =====================================================
         Page Title
         Displays the title in the browser tab.
    ====================================================== -->
    <title>Bootstrap Tooltip Example</title>

    <!-- =====================================================
         Bootstrap 5 CSS CDN
         Used for Bootstrap styling and components.
    ====================================================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- =====================================================
         Bootstrap Container
         container : Creates a responsive fixed-width layout.
         mt-5      : Adds top margin (3rem).
    ====================================================== -->
    <div class="container mt-5">

        <!-- Heading -->
        <h2 class="mb-4">Bootstrap Tooltip Example</h2>

        <!-- =====================================================
             Tooltip Button
         ====================================================== -->

        <!--
            btn                     : Creates a Bootstrap button.
            btn-primary             : Blue colored button.
            data-bs-toggle="tooltip": Enables the tooltip.
            data-bs-placement="top" : Displays tooltip above the button.
            title                   : Tooltip message.
        -->
        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="tooltip"
                data-bs-placement="top"
                title="Welcome to Bootstrap Tooltip">

            Hover Me

        </button>

    </div>

    <!-- =====================================================
         Bootstrap JavaScript Bundle
         Required for all interactive Bootstrap components
         like Tooltip, Modal, Carousel, Dropdown, etc.
    ====================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- =====================================================
         JavaScript to Enable Tooltips
         Bootstrap tooltips do NOT work automatically.
         We must initialize them using JavaScript.
    ====================================================== -->
    <script>

        // Select all elements having data-bs-toggle="tooltip"
        const tooltipTriggerList =
            document.querySelectorAll('[data-bs-toggle="tooltip"]');

        // Loop through each tooltip element
        tooltipTriggerList.forEach(function (tooltipTriggerEl) {

            // Create a Bootstrap Tooltip object
            new bootstrap.Tooltip(tooltipTriggerEl);

        });

    </script>

</body>

</html>
